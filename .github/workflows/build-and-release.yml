name: Build & Auto-Release APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build-and-release:
    name: Build APK and Publish Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to upload releases

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Fix Line Endings (CRLF to LF) for gradlew
        run: sed -i 's/\r$//' gradlew

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode Debug Keystore
        run: |
          if [ -f "debug.keystore.base64" ]; then
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "debug.keystore.base64 file not found!"
          fi

      - name: Build Android Debug APK
        run: ./gradlew assembleDebug

      - name: Locate and Rename APK
        run: |
          mkdir -p build-release
          cp app/build/outputs/apk/debug/app-debug.apk build-release/Apex_Capital.apk

      - name: Create or Update "Latest" GitHub Release
        uses: ncipollo/release-action@v1
        with:
          name: "Apex Capital - Latest Mobile Build"
          tag: "latest"
          body: |
            ## 🎮 Apex Capital Mobile Installation
            
            This release is automatically updated every time new code is committed!
            
            ### 📲 Quick Install Instructions for Phone & Tablet:
            1. **[Click here to download Apex_Capital.apk directly](https://github.com/${{ github.repository }}/releases/download/latest/Apex_Capital.apk)**
            2. Open the downloaded file on your Android device.
            3. Tap **Install** (if prompted, turn on "Allow installation from unknown sources").
            4. Start playing Apex Capital!
          artifacts: "build-release/Apex_Capital.apk"
          allowUpdates: true
          replacesArtifacts: true
          makeLatest: true
          token: ${{ secrets.GITHUB_TOKEN }}
